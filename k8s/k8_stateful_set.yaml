apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: ai-lab
spec:
  serviceName: qdrant-headless
  replicas: 2

  selector:
    matchLabels:
      app: qdrant

  template:
    metadata:
      labels:
        app: qdrant

    spec:
      containers:
      - name: qdrant
        image: qdrant/qdrant:latest

        ports:
        - containerPort: 6333

        volumeMounts:
        - name: qdrant-storage
          mountPath: /qdrant/storage

  volumeClaimTemplates:
  - metadata:
      name: qdrant-storage
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 1Gi

