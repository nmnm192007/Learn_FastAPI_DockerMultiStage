apiVersion: apps/v1
kind: Deployment
metadata:
  name: graceful_shutdown_api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: graceful_shutdown_api
  template:
    metadata:
      labels:
        app: graceful_shutdown_api

    spec:
      containers:
        - name: api
          image: api_with_graceful_shutdown:v1
          ports:
            - containerPort: 8000
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "echo 'PreStop started, PreStop hook running'; sleep 5"]

          terminationGracePeriodSeconds: 30
      
