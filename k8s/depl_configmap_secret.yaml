apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-demo
  template:
    metadata:
      labels:
        app: config-demo
    spec:
      containers:
        - name: app
          image: python:3.9-slim
          command: ["sh", "-c"]
          args:
            - |
              while true;
              do
                echo "APP_MODE=$APP_MODE";
                echo "LOG_LEVEL=$LOG_LEVEL";
                echo "DB_USER=$DB_USER";
                echo "DB_PASSWORD=$DB_PASSWORD";
                echo "------------------------------";
                sleep 10;
              done
          envFrom:
            - configMapRef:
                name: app-config
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password
          # FIXED: volumeMounts must be inside the container block
          volumeMounts:
            - name: config-volume
              mountPath: /etc/config
      # volumes stays here (at the pod spec level)
      volumes:
        - name: config-volume
          configMap:
            name: file-config